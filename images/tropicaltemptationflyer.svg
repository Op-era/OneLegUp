  <g transform="translate(138 1450)">
    <rect x="0" y="-44" width="804" height="56" rx="18" fill="#fff2cf" fill-opacity="0.16" stroke="#fff2cf" stroke-opacity="0.25"/>
    <text x="402" y="-8" text-anchor="middle" class="sans cream" font-size="26" font-weight="700" letter-spacing="2">TEXT TO RSVP: (559) 549-3882</text>
