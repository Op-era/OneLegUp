<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Community Forum – One Leg Up</title>
  <link rel="icon" type="image/png" href="images/NewLogo/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100vh;background:#080808;font-family:'Poppins',sans-serif;color:#fff;overflow-x:hidden;}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(10,8,18,0.7),rgba(0,0,0,0.95) 80%),url('images/playboy-bg.png') center center/cover no-repeat;}
    @keyframes goldShimmer{0%{background-position:-400% center;}100%{background-position:400% center;}}
    .gold-shimmer{background:linear-gradient(90deg,#7a5700 0%,#c8960c 12%,#f3c675 25%,#fffbe8 38%,#ffd700 50%,#fffbe8 62%,#f3c675 75%,#c8960c 88%,#7a5700 100%);background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 5s linear infinite;}
    .page{position:relative;z-index:10;min-height:100vh;padding:30px 20px 60px;max-width:860px;margin:0 auto;}

    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .back{display:inline-flex;align-items:center;gap:5px;color:rgba(243,198,117,0.7);text-decoration:none;font-size:0.82rem;letter-spacing:0.08em;transition:color .2s;}
    .back:hover{color:#f3c675;}
    .back svg{width:14px;height:14px;fill:currentColor;}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:900;}
    .new-post-btn{padding:9px 20px;background:linear-gradient(135deg,#f3c675,#ec8b57);border:none;border-radius:8px;color:#0d1f28;font-family:'Poppins',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(236,139,87,0.3);}
    .new-post-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(236,139,87,0.45);}

    .section-header{display:flex;align-items:center;gap:12px;margin:24px 0 12px;}
    .section-header .line{flex:1;height:1px;background:rgba(243,198,117,0.15);}
    .section-label{font-size:0.68rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(243,198,117,0.5);white-space:nowrap;font-weight:600;}

    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:8px;}
    .cat-card{background:rgba(10,25,35,0.72);border:1px solid rgba(243,198,117,0.14);border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .2s,background .2s;display:block;text-decoration:none;}
    .cat-card:hover{border-color:rgba(243,198,117,0.35);background:rgba(10,25,35,0.9);}
    .cat-card.locked{opacity:.5;cursor:default;pointer-events:none;}
    .cat-icon{font-size:1.5rem;margin-bottom:8px;}
    .cat-name{font-size:0.95rem;font-weight:600;color:#f3c675;margin-bottom:4px;}
    .cat-desc{font-size:0.77rem;color:rgba(255,220,150,0.45);line-height:1.4;margin-bottom:10px;}
    .cat-meta{font-size:0.7rem;color:rgba(255,255,255,0.28);}
    .lock-note{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:6px;}

    .view-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .view-header-info{flex:1;}
    .view-header-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#f3c675;}
    .view-header-desc{font-size:0.78rem;color:rgba(255,220,150,0.4);margin-top:3px;}

    .thread-list{display:flex;flex-direction:column;gap:8px;}
    .thread-item{background:rgba(10,25,35,0.72);border:1px solid rgba(243,198,117,0.12);border-radius:10px;padding:14px 18px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:border-color .2s,background .2s;}
    .thread-item:hover{border-color:rgba(243,198,117,0.3);background:rgba(10,25,35,0.9);}
    .thread-main{flex:1;min-width:0;}
    .thread-title{font-size:0.9rem;font-weight:600;color:#e0d4b8;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .thread-item:hover .thread-title{color:#f3c675;}
    .thread-by{font-size:0.72rem;color:rgba(255,255,255,0.32);}
    .thread-stats{flex-shrink:0;text-align:right;}
    .reply-count{font-size:0.85rem;font-weight:600;color:rgba(243,198,117,0.55);}
    .reply-label{font-size:0.65rem;color:rgba(255,255,255,0.25);}
    .thread-date{font-size:0.65rem;color:rgba(255,255,255,0.25);margin-top:2px;}

    .pagination{display:flex;justify-content:center;gap:8px;margin-top:20px;}
    .page-btn{padding:5px 14px;border-radius:6px;border:1px solid rgba(243,198,117,0.2);background:rgba(255,255,255,0.04);color:rgba(243,198,117,0.6);font-family:'Poppins',sans-serif;font-size:0.78rem;cursor:pointer;transition:all .2s;}
    .page-btn:hover,.page-btn.active{background:rgba(243,198,117,0.12);border-color:rgba(243,198,117,0.4);color:#f3c675;}
    .page-btn:disabled{opacity:.3;cursor:not-allowed;}

    .post-card{background:rgba(10,25,35,0.82);border:1px solid rgba(243,198,117,0.2);border-radius:12px;padding:22px 24px;margin-bottom:16px;}
    .post-card-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;margin-bottom:10px;line-height:1.3;}
    .post-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .handle{font-size:0.8rem;font-weight:700;}
    .meta-date{font-size:0.72rem;color:rgba(255,255,255,0.3);}
    .del-btn{background:none;border:none;color:rgba(248,113,113,0.4);cursor:pointer;font-size:0.72rem;padding:0;transition:color .2s;margin-left:auto;}
    .del-btn:hover{color:#f87171;}
    .post-body{font-size:0.88rem;color:#d0c6b0;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
    .post-body img{max-width:100%;max-height:320px;border-radius:8px;display:block;margin:8px 0;}

    .replies-section{margin-top:8px;}
    .replies-label{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(243,198,117,0.45);margin:20px 0 10px;}
    .reply-card{background:rgba(10,25,35,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 18px;margin-bottom:8px;}
    .reply-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .reply-body{font-size:0.85rem;color:#c0b8a8;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
    .reply-body img{max-width:100%;max-height:220px;border-radius:6px;display:block;margin:6px 0;}

    .reply-form{background:rgba(10,25,35,0.65);border:1px solid rgba(243,198,117,0.15);border-radius:12px;padding:18px 20px;margin-top:16px;}
    .reply-form-title{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(243,198,117,0.55);margin-bottom:12px;}
    textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(243,198,117,0.2);border-radius:8px;color:#e0d4b8;font-family:'Poppins',sans-serif;font-size:0.86rem;outline:none;resize:vertical;min-height:90px;transition:border-color .2s;}
    textarea:focus{border-color:rgba(243,198,117,0.45);}
    textarea::placeholder{color:rgba(255,255,255,0.18);}
    .form-toolbar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:8px;}
    .toolbar-left{display:flex;gap:8px;align-items:center;}
    .emoji-toggle{background:rgba(255,255,255,0.06);border:1px solid rgba(243,198,117,0.15);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:0.82rem;color:#e0d4b8;transition:background .2s;}
    .emoji-toggle:hover{background:rgba(243,198,117,0.1);}
    .gif-hint{font-size:0.68rem;color:rgba(255,255,255,0.22);}
    .post-submit{padding:9px 22px;background:linear-gradient(135deg,#f3c675,#ec8b57);border:none;border-radius:7px;color:#0d1f28;font-family:'Poppins',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:transform .2s;}
    .post-submit:hover{transform:translateY(-1px);}
    .post-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .emoji-picker{display:none;background:rgba(8,16,24,0.98);border:1px solid rgba(243,198,117,0.2);border-radius:10px;padding:12px;margin-top:8px;}
    .emoji-picker.open{display:block;}
    .emoji-cat-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
    .ect{padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,220,150,0.55);font-size:0.68rem;cursor:pointer;transition:all .15s;font-family:'Poppins',sans-serif;}
    .ect.active{background:rgba(243,198,117,0.12);border-color:rgba(243,198,117,0.4);color:#f3c675;}
    .emoji-grid{display:flex;flex-wrap:wrap;gap:3px;}
    .em{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 5px;border-radius:5px;transition:background .15s;line-height:1;}
    .em:hover{background:rgba(255,255,255,0.12);}

    .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);align-items:flex-start;justify-content:center;padding:50px 20px 20px;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal{background:#0a1923;border:1px solid rgba(243,198,117,0.25);border-radius:16px;padding:28px;width:100%;max-width:580px;}
    .modal-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#f3c675;margin-bottom:20px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(243,198,117,0.7);margin-bottom:7px;font-weight:600;}
    input[type="text"],select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(243,198,117,0.22);border-radius:8px;color:#fff;font-family:'Poppins',sans-serif;font-size:0.9rem;outline:none;transition:border-color .2s;}
    input[type="text"]:focus,select:focus{border-color:rgba(243,198,117,0.5);}
    select option{background:#0a1923;}
    .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
    .cancel-btn{padding:9px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,220,150,0.6);font-family:'Poppins',sans-serif;font-size:0.82rem;cursor:pointer;transition:background .2s;}
    .cancel-btn:hover{background:rgba(255,255,255,0.1);}
    .alert{padding:10px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:12px;display:none;}
    .alert-err{background:rgba(180,30,30,0.2);border:1px solid rgba(220,60,60,0.4);color:#ffa0a0;}
    .alert-ok{background:rgba(30,120,60,0.2);border:1px solid rgba(60,180,100,0.4);color:#90ffb8;}
    .empty{text-align:center;padding:50px 20px;color:rgba(255,220,150,0.3);font-size:0.88rem;}
    .loading{text-align:center;padding:40px;color:rgba(255,220,150,0.35);}
    .members-gate{text-align:center;padding:40px 20px;background:rgba(10,25,35,0.7);border:1px solid rgba(243,198,117,0.15);border-radius:12px;}
    .members-gate .gi{font-size:2.5rem;margin-bottom:12px;}
    .members-gate p{font-size:0.88rem;color:rgba(200,184,150,0.65);line-height:1.6;}
    .members-gate a{color:#f3c675;text-decoration:none;}
    .no-handle-notice{padding:14px 18px;background:rgba(243,198,117,0.07);border:1px solid rgba(243,198,117,0.2);border-radius:10px;font-size:0.84rem;color:rgba(243,198,117,0.8);margin-bottom:16px;}
    .no-handle-notice a{color:#f3c675;font-weight:600;}
  </style>
</head>
<body>
<div id="bg"></div>
<div class="page">

  <div class="topbar">
    <div class="topbar-left">
      <a href="#" id="back-btn" class="back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> <span id="back-label">Dashboard</span></a>
      <h1 class="page-title gold-shimmer">Community Forum</h1>
    </div>
    <button class="new-post-btn" id="new-post-btn" style="display:none;" onclick="openModal()">+ New Post</button>
  </div>

  <div id="main-view"></div>
</div>

<!-- New Post Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New Post</div>
    <div class="alert" id="modal-alert"></div>
    <div class="field">
      <label>Category</label>
      <select id="new-cat"></select>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="new-title" placeholder="Give your post a title…" maxlength="200">
    </div>
    <div class="field">
      <label>Body</label>
      <textarea id="new-body" placeholder="Write your post… paste a .gif URL on its own line to embed it." style="min-height:130px;"></textarea>
      <div class="form-toolbar">
        <div class="toolbar-left">
          <button class="emoji-toggle" onclick="toggleEmojiPicker('modal-emoji','new-body')">😈 Emoji</button>
          <span class="gif-hint">Paste a .gif URL on its own line to embed</span>
        </div>
      </div>
      <div class="emoji-picker" id="modal-emoji"></div>
    </div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="post-submit" id="submit-post-btn" onclick="submitPost()">Post It</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.onelegup.club';
const token = localStorage.getItem('olu_token');
const AUTH  = token ? { Authorization: `Bearer ${token}` } : {};
let me = null;
let _currentCat = null;
let _currentPostId = null;

// ── Emoji data ────────────────────────────────────────────────────────────────
const EMOJI_SETS = {
  'Faces 😏': ['😈','😏','🥵','🤤','😍','😘','💋','😇','🤭','😜','🫦','😮‍💨','🥴','😳','🤫','💀','🫠','😤','😩','😻'],
  'Body 🍑':  ['🍑','🍆','🌮','🍒','🍌','💦','👅','🫦','🍫','🖕','👙','🩲','🛁','🛏️','👠','💅','🦵','🤲','🙈','🍯'],
  'Hearts ❤️':['❤️‍🔥','💗','💓','💘','💝','🖤','💜','💙','🤍','🩷','💞','💕','❣️','🫶','💋','🥰','😻','💌','🌹','🌸'],
  'Fun 🎉':   ['🔥','✨','🌙','🎉','🥂','🍾','💃','🕺','🎀','⛓️','🌶️','💫','🌊','🎭','🍭','🦋','🌺','🥀','💎','🏆'],
};
let _activeEmoji = { pickerId: null, taId: null, cat: Object.keys(EMOJI_SETS)[0] };

function buildEmojiPicker(pickerId, taId) {
  const el = document.getElementById(pickerId);
  if (!el) return;
  const cats = Object.keys(EMOJI_SETS);
  el.innerHTML = `
    <div class="emoji-cat-tabs">${cats.map(c=>`<button class="ect${c===_activeEmoji.cat?' active':''}" onclick="switchEmojiCat('${pickerId}','${taId}','${c}')">${c}</button>`).join('')}</div>
    <div class="emoji-grid" id="${pickerId}-grid">${EMOJI_SETS[_activeEmoji.cat].map(e=>`<button class="em" onclick="insertEmoji('${taId}','${e}')">${e}</button>`).join('')}</div>`;
}

function toggleEmojiPicker(pickerId, taId) {
  const el = document.getElementById(pickerId);
  if (!el) return;
  const opening = !el.classList.contains('open');
  if (opening) buildEmojiPicker(pickerId, taId);
  el.classList.toggle('open');
  _activeEmoji.pickerId = pickerId;
  _activeEmoji.taId = taId;
}

function switchEmojiCat(pickerId, taId, cat) {
  _activeEmoji.cat = cat;
  const grid = document.getElementById(pickerId+'-grid');
  if (grid) grid.innerHTML = EMOJI_SETS[cat].map(e=>`<button class="em" onclick="insertEmoji('${taId}','${e}')">${e}</button>`).join('');
  document.querySelectorAll(`#${pickerId} .ect`).forEach(b => b.classList.toggle('active', b.textContent===cat));
}

function insertEmoji(taId, emoji) {
  const ta = document.getElementById(taId);
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.slice(0,s) + emoji + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + emoji.length;
  ta.focus();
}

// ── Body renderer ─────────────────────────────────────────────────────────────
function renderBody(text) {
  return text.split('\n').map(line => {
    const t = line.trim();
    if (/^https?:\/\/\S+\.(gif|gifv|webp)(\?[^\s]*)?$/i.test(t) ||
        /^https?:\/\/(?:i\.giphy\.com|media\d*\.giphy\.com|media\.tenor\.com)\S*$/i.test(t)) {
      return `<img src="${t.replace(/"/g,'&quot;')}" loading="lazy">`;
    }
    return esc(line);
  }).join('<br>');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtTime(d){return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}

// ── Routing ───────────────────────────────────────────────────────────────────
async function init() {
  if (token) {
    try {
      const r = await fetch(`${API}/member/me`, { headers: AUTH });
      if (r.ok) me = await r.json();
    } catch(e) {}
  }
  window.addEventListener('hashchange', route);
  route();
}

function route() {
  const hash = location.hash.slice(1);
  if (!hash || hash === 'categories') {
    setBack('dashboard.html', 'Dashboard');
    showCategories();
  } else if (hash.startsWith('cat/')) {
    showThreads(hash.slice(4), 1);
  } else if (hash.startsWith('post/')) {
    showPost(hash.slice(5));
  } else {
    showCategories();
  }
}

function setBack(href, label) {
  document.getElementById('back-btn').href = href;
  document.getElementById('back-label').textContent = label;
}

// ── Categories view ───────────────────────────────────────────────────────────
async function showCategories() {
  setBack('dashboard.html', 'Dashboard');
  document.getElementById('new-post-btn').style.display = 'none';
  const view = document.getElementById('main-view');
  view.innerHTML = '<div class="loading">Loading…</div>';
  const res = await fetch(`${API}/forum/categories`, { headers: AUTH });
  const cats = await res.json();
  const sfw  = cats.filter(c => !c.nsfw);
  const nsfw = cats.filter(c =>  c.nsfw);
  const approved = me?.status === 'approved';

  view.innerHTML = `
    <div class="section-header"><div class="line"></div><span class="section-label">✨ Vanilla — SFW</span><div class="line"></div></div>
    <div class="cat-grid">${sfw.map(c => catCard(c)).join('')}</div>
    <div class="section-header"><div class="line"></div><span class="section-label">🔞 Lifestyle — NSFW</span><div class="line"></div></div>
    <div class="cat-grid">${nsfw.map(c => catCard(c, approved)).join('')}</div>
    ${!approved && token ? `<p style="text-align:center;font-size:0.78rem;color:rgba(255,220,150,0.35);margin-top:8px;">NSFW sections unlock once your membership is approved.</p>` : ''}
    ${!token ? `<p style="text-align:center;font-size:0.78rem;color:rgba(255,220,150,0.35);margin-top:8px;"><a href="login.html" style="color:#f3c675;">Log in</a> to access NSFW sections and post.</p>` : ''}`;
}

function catCard(c, canAccess = true) {
  const locked = c.nsfw && !canAccess;
  const last = c.last_activity ? fmtDate(c.last_activity) : 'No posts yet';
  return `<div class="cat-card${locked?' locked':''}" onclick="${locked?'':'location.hash=\"cat/'+c.id+'\"'}">
    <div class="cat-icon">${c.icon}</div>
    <div class="cat-name">${esc(c.name)}</div>
    <div class="cat-desc">${esc(c.desc)}</div>
    <div class="cat-meta">${c.post_count} posts · ${c.reply_count} replies · Last: ${last}</div>
    ${locked ? '<div class="lock-note">🔒 Approved members only</div>' : ''}
  </div>`;
}

// ── Thread list view ──────────────────────────────────────────────────────────
async function showThreads(catId, page) {
  _currentCat = catId;
  const view = document.getElementById('main-view');
  view.innerHTML = '<div class="loading">Loading…</div>';
  const res = await fetch(`${API}/forum/posts?category=${catId}&page=${page}`, { headers: AUTH });
  if (!res.ok) {
    const d = await res.json();
    view.innerHTML = gateHTML(d.error);
    document.getElementById('new-post-btn').style.display = 'none';
    return;
  }
  const { category: cat, posts, total, pages } = await res.json();
  setBack('#categories', 'All Categories');
  const canPost = me?.status === 'approved';
  if (canPost) document.getElementById('new-post-btn').style.display = '';
  else document.getElementById('new-post-btn').style.display = 'none';

  const threadItems = posts.length
    ? posts.map(p => `
        <div class="thread-item" onclick="location.hash='post/${p.id}'">
          <div class="thread-main">
            <div class="thread-title">${esc(p.title)}</div>
            <div class="thread-by">by <span class="handle" style="color:${p.name_color||'#f3c675'}">${esc(p.forum_handle)}</span> · ${fmtDate(p.created_at)}</div>
          </div>
          <div class="thread-stats">
            <div class="reply-count">${p.reply_count}</div>
            <div class="reply-label">replies</div>
          </div>
        </div>`).join('')
    : '<div class="empty">No posts yet. Be the first!</div>';

  const paginationHTML = pages > 1 ? `<div class="pagination">
    <button class="page-btn" ${page<=1?'disabled':''} onclick="showThreads('${catId}',${page-1})">← Prev</button>
    <span style="font-size:0.78rem;color:rgba(255,220,150,0.4);padding:5px 8px;">Page ${page} of ${pages}</span>
    <button class="page-btn" ${page>=pages?'disabled':''} onclick="showThreads('${catId}',${page+1})">Next →</button>
  </div>` : '';

  view.innerHTML = `
    <div class="view-header">
      <div class="view-header-info">
        <div class="view-header-title">${cat.icon} ${esc(cat.name)}</div>
        <div class="view-header-desc">${esc(cat.desc)}</div>
      </div>
    </div>
    ${canPost && !me?.forum_handle ? `<div class="no-handle-notice">You need a forum handle before you can post. <a href="dashboard.html">Set one in your dashboard →</a></div>` : ''}
    <div class="thread-list">${threadItems}</div>
    ${paginationHTML}`;
}

// ── Post detail view ──────────────────────────────────────────────────────────
async function showPost(postId) {
  _currentPostId = postId;
  document.getElementById('new-post-btn').style.display = 'none';
  const view = document.getElementById('main-view');
  view.innerHTML = '<div class="loading">Loading…</div>';
  const res = await fetch(`${API}/forum/post/${postId}`, { headers: AUTH });
  if (!res.ok) {
    const d = await res.json();
    view.innerHTML = gateHTML(d.error);
    return;
  }
  const { post, replies, category: cat } = await res.json();
  setBack(`#cat/${cat.id}`, cat.name);
  const isAdmin = me?.is_admin;
  const canDelete = (id, authorId) => isAdmin || me?.id === authorId;

  const replyCards = replies.length
    ? replies.map(r => `
        <div class="reply-card" id="reply-${r.id}">
          <div class="reply-meta">
            <span class="handle" style="color:${r.name_color||'#f3c675'}">${esc(r.forum_handle)}</span>
            <span class="meta-date">${fmtTime(r.created_at)}</span>
            ${canDelete(r.id, r.author_id) ? `<button class="del-btn" onclick="deleteReply('${r.id}')">Delete</button>` : ''}
          </div>
          <div class="reply-body">${renderBody(r.body)}</div>
        </div>`).join('')
    : '<div class="empty" style="padding:20px 0;font-size:0.82rem;">No replies yet.</div>';

  const replyForm = me?.status === 'approved'
    ? (me.forum_handle
        ? `<div class="reply-form">
            <div class="reply-form-title">Leave a Reply</div>
            <div class="alert" id="reply-alert"></div>
            <textarea id="reply-body" placeholder="Write your reply…"></textarea>
            <div class="form-toolbar">
              <div class="toolbar-left">
                <button class="emoji-toggle" onclick="toggleEmojiPicker('reply-emoji','reply-body')">😈 Emoji</button>
                <span class="gif-hint">Paste a .gif URL on its own line to embed</span>
              </div>
              <button class="post-submit" id="reply-btn" onclick="submitReply('${post.id}')">Reply</button>
            </div>
            <div class="emoji-picker" id="reply-emoji"></div>
          </div>`
        : `<div class="no-handle-notice">Set a <a href="dashboard.html">forum handle in your dashboard</a> before replying.</div>`)
    : (token
        ? `<div class="members-gate"><div class="gi">🔒</div><p>Your membership must be approved to reply.<br><a href="dashboard.html">Check your status →</a></p></div>`
        : `<div class="members-gate"><div class="gi">🔒</div><p><a href="login.html">Log in</a> to join the conversation.</p></div>`);

  view.innerHTML = `
    <div class="post-card">
      <div class="post-card-title">${esc(post.title)}</div>
      <div class="post-meta">
        <span class="handle" style="color:${post.name_color||'#f3c675'}">${esc(post.forum_handle)}</span>
        <span class="meta-date">${fmtTime(post.created_at)}</span>
        ${canDelete(post.id, post.author_id) ? `<button class="del-btn" onclick="deletePost('${post.id}','${cat.id}')">Delete Post</button>` : ''}
      </div>
      <div class="post-body">${renderBody(post.body)}</div>
    </div>
    <div class="replies-section">
      <div class="replies-label">${replies.length} ${replies.length===1?'reply':'replies'}</div>
      ${replyCards}
      ${replyForm}
    </div>`;
}

function gateHTML(msg) {
  return `<div class="members-gate"><div class="gi">🔒</div><p>${esc(msg||'Members only.')}<br><br><a href="login.html">Log in</a> · <a href="register.html">Create account</a></p></div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function openModal() {
  const sel = document.getElementById('new-cat');
  if (!sel.options.length) {
    fetch(`${API}/forum/categories`, { headers: AUTH }).then(r=>r.json()).then(cats => {
      const approved = me?.status === 'approved';
      sel.innerHTML = cats.filter(c => !c.nsfw || approved).map(c => `<option value="${c.id}">${c.icon} ${c.name}${c.nsfw?' 🔞':''}</option>`).join('');
      if (_currentCat) sel.value = _currentCat;
    });
  } else if (_currentCat) sel.value = _currentCat;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-emoji').classList.remove('open');
}

async function submitPost() {
  const btn = document.getElementById('submit-post-btn');
  const alertEl = document.getElementById('modal-alert');
  alertEl.style.display = 'none';
  const category = document.getElementById('new-cat').value;
  const title = document.getElementById('new-title').value.trim();
  const body  = document.getElementById('new-body').value.trim();
  if (!title) { alertEl.textContent='Title required'; alertEl.className='alert alert-err'; alertEl.style.display='block'; return; }
  if (!body)  { alertEl.textContent='Body required';  alertEl.className='alert alert-err'; alertEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Posting…';
  const res = await fetch(`${API}/forum/post`, {
    method:'POST', headers:{'Content-Type':'application/json',...AUTH},
    body: JSON.stringify({ category, title, body })
  });
  const data = await res.json();
  if (!res.ok) {
    alertEl.textContent = data.error||'Error'; alertEl.className='alert alert-err'; alertEl.style.display='block';
    btn.disabled=false; btn.textContent='Post It'; return;
  }
  closeModal();
  document.getElementById('new-title').value='';
  document.getElementById('new-body').value='';
  btn.disabled=false; btn.textContent='Post It';
  location.hash = `post/${data.id}`;
}

async function submitReply(postId) {
  const btn = document.getElementById('reply-btn');
  const alertEl = document.getElementById('reply-alert');
  alertEl.style.display='none';
  const body = document.getElementById('reply-body').value.trim();
  if (!body) { alertEl.textContent='Write something first'; alertEl.className='alert alert-err'; alertEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Sending…';
  const res = await fetch(`${API}/forum/reply`, {
    method:'POST', headers:{'Content-Type':'application/json',...AUTH},
    body: JSON.stringify({ post_id: postId, body })
  });
  const data = await res.json();
  if (!res.ok) {
    alertEl.textContent=data.error||'Error'; alertEl.className='alert alert-err'; alertEl.style.display='block';
    btn.disabled=false; btn.textContent='Reply'; return;
  }
  document.getElementById('reply-body').value='';
  btn.disabled=false; btn.textContent='Reply';
  showPost(postId);
}

async function deletePost(postId, catId) {
  if (!confirm('Delete this post and all its replies?')) return;
  await fetch(`${API}/forum/post/${postId}`, { method:'DELETE', headers:AUTH });
  location.hash = `cat/${catId}`;
}

async function deleteReply(replyId) {
  if (!confirm('Delete this reply?')) return;
  await fetch(`${API}/forum/reply/${replyId}`, { method:'DELETE', headers:AUTH });
  showPost(_currentPostId);
}

init();
</script>
<script src="music.js"></script>
</body>
