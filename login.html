<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Members Login – One Leg Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100vh;background:#080808;font-family:'Poppins',sans-serif;color:#fff;overflow-x:hidden;}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(26,24,40,0.18),rgba(4,6,14,0.6) 60%,rgba(0,0,0,0.92) 100%),url('images/playboy-bg.png') center center/cover no-repeat;}
    #bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 25%,rgba(255,186,118,0.07),transparent 50%);}
    @keyframes goldShimmer{0%{background-position:-400% center;}100%{background-position:400% center;}}
    .gold-shimmer{background:linear-gradient(90deg,#7a5700 0%,#c8960c 12%,#f3c675 25%,#fffbe8 38%,#ffd700 50%,#fffbe8 62%,#f3c675 75%,#c8960c 88%,#7a5700 100%);background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 5s linear infinite;}
    .page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
    .back{position:absolute;top:30px;left:20px;display:inline-flex;align-items:center;gap:6px;color:rgba(243,198,117,0.7);text-decoration:none;font-size:0.82rem;letter-spacing:0.08em;transition:color .2s;}
    .back:hover{color:#f3c675;}
    .back svg{width:14px;height:14px;fill:currentColor;}
    .header{text-align:center;margin-bottom:28px;}
    .header .eyebrow{font-size:0.72rem;letter-spacing:0.42em;text-transform:uppercase;color:rgba(255,220,150,0.5);margin-bottom:6px;}
    .header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,8vw,3rem);font-weight:900;line-height:1;}
    .card{width:100%;max-width:440px;background:rgba(10,25,35,0.78);border:1px solid rgba(243,198,117,0.2);border-radius:16px;padding:32px 28px;backdrop-filter:blur(14px);box-shadow:0 24px 60px rgba(0,0,0,0.5);}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(243,198,117,0.75);margin-bottom:7px;font-weight:600;}
    input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(243,198,117,0.22);border-radius:8px;color:#fff;font-family:'Poppins',sans-serif;font-size:0.95rem;outline:none;transition:border-color .25s,box-shadow .25s;}
    input:focus{border-color:rgba(243,198,117,0.6);box-shadow:0 0 0 3px rgba(243,198,117,0.1);}
    input::placeholder{color:rgba(255,255,255,0.22);}
    .btn{width:100%;margin-top:8px;padding:14px 0;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#0d1f28;background:linear-gradient(135deg,#f3c675,#ec8b57);border:none;border-radius:10px;cursor:pointer;transition:transform .25s,box-shadow .25s;box-shadow:0 8px 28px rgba(236,139,87,0.35);}
    .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(236,139,87,0.5);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .forgot-link{margin-top:12px;text-align:right;font-size:0.78rem;}
    .forgot-link a{color:rgba(243,198,117,0.6);text-decoration:none;cursor:pointer;}
    .forgot-link a:hover{color:#f3c675;}
    .bottom-links{margin-top:20px;text-align:center;font-size:0.82rem;color:rgba(255,220,150,0.5);}
    .bottom-links a{color:rgba(243,198,117,0.8);text-decoration:none;}
    .bottom-links a:hover{color:#f3c675;}
    .alert{padding:12px 16px;border-radius:8px;font-size:0.84rem;margin-bottom:16px;display:none;}
    .alert-err{background:rgba(180,30,30,0.2);border:1px solid rgba(220,60,60,0.4);color:#ffa0a0;}
    .alert-ok{background:rgba(30,120,60,0.2);border:1px solid rgba(60,180,100,0.4);color:#90ffb8;}
    .divider{border:none;border-top:1px solid rgba(243,198,117,0.12);margin:20px 0;}
  </style>
</head>
<body>
<div id="bg"></div>
<div class="page">
  <a href="index.html" class="back"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Back</a>

  <div class="header">
    <div class="eyebrow">One Leg Up</div>
    <h1 class="gold-shimmer">Members Portal</h1>
  </div>

  <div class="card">
    <div class="alert" id="alert"></div>

    <!-- Login form -->
    <div id="login-view">
      <form id="login-form" novalidate>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@email.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password">
        </div>
        <button type="submit" class="btn" id="login-btn">Log In</button>
      </form>
      <div class="forgot-link"><a id="forgot-link">Forgot password?</a></div>
      <hr class="divider">
      <div class="bottom-links">
        Don't have an account? <a href="register.html">Create membership</a>
      </div>
    </div>

    <!-- Forgot password form -->
    <div id="forgot-view" style="display:none;">
      <p style="font-size:0.85rem;color:#c8b896;margin-bottom:16px;">Enter your email and we'll send a reset link.</p>
      <form id="forgot-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="reset-email" placeholder="you@email.com">
        </div>
        <button type="submit" class="btn" id="reset-btn">Send Reset Link</button>
      </form>
      <div class="forgot-link" style="text-align:left;margin-top:12px;"><a id="back-to-login">← Back to login</a></div>
    </div>

    <!-- New password form (after clicking reset link) -->
    <div id="newpw-view" style="display:none;">
      <p style="font-size:0.85rem;color:#c8b896;margin-bottom:16px;">Enter your new password.</p>
      <form id="newpw-form">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="new-pw" placeholder="Minimum 8 characters">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm-new-pw" placeholder="Repeat password">
        </div>
        <button type="submit" class="btn" id="newpw-btn">Set New Password</button>
      </form>
    </div>
  </div>
</div>

<script>
  const { createClient } = window.supabase;
  const sb = createClient(
    'https://hahjiqoiialzbdnbwqxi.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhaGppcW9paWFsemJkbmJ3cXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTk1NTUsImV4cCI6MjA5NTE3NTU1NX0.HJROMfXZDxaS6cW992MaC46IO2eaOMEylilfhT4umiM'
  );

  const alertEl = document.getElementById('alert');
  function showAlert(msg, type = 'err') {
    alertEl.textContent = msg;
    alertEl.className = 'alert alert-' + type;
    alertEl.style.display = 'block';
  }

  // Handle Supabase auth redirects (email confirmation, password reset)
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      document.getElementById('login-view').style.display   = 'none';
      document.getElementById('forgot-view').style.display  = 'none';
      document.getElementById('newpw-view').style.display   = 'block';
    } else if (event === 'SIGNED_IN' && session) {
      window.location.href = 'dashboard.html';
    }
  });

  // Login form
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.style.display = 'none';
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Logging in…';
    const { error } = await sb.auth.signInWithPassword({
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    });
    if (error) { showAlert(error.message); btn.disabled = false; btn.textContent = 'Log In'; }
    // onAuthStateChange handles redirect on success
  });

  // Forgot password toggle
  document.getElementById('forgot-link').addEventListener('click', () => {
    alertEl.style.display = 'none';
    document.getElementById('login-view').style.display  = 'none';
    document.getElementById('forgot-view').style.display = 'block';
  });
  document.getElementById('back-to-login').addEventListener('click', () => {
    alertEl.style.display = 'none';
    document.getElementById('forgot-view').style.display = 'none';
    document.getElementById('login-view').style.display  = 'block';
  });

  // Send reset email
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reset-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    const { error } = await sb.auth.resetPasswordForEmail(
      document.getElementById('reset-email').value.trim(),
      { redirectTo: 'https://onelegup.club/login.html' }
    );
    btn.disabled = false; btn.textContent = 'Send Reset Link';
    if (error) { showAlert(error.message); }
    else { showAlert('Reset link sent — check your email.', 'ok'); }
  });

  // Set new password
  document.getElementById('newpw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw  = document.getElementById('new-pw').value;
    const cpw = document.getElementById('confirm-new-pw').value;
    if (pw.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
    if (pw !== cpw)    { showAlert('Passwords do not match.'); return; }
    const btn = document.getElementById('newpw-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) { showAlert(error.message); btn.disabled = false; btn.textContent = 'Set New Password'; }
    else { showAlert('Password updated! Redirecting…', 'ok'); setTimeout(() => window.location.href = 'dashboard.html', 1500); }
  });
</script>
</body>
</html>
