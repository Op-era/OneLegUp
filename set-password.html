<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Your Password – One Leg Up</title>
  <link rel="icon" type="image/png" href="images/NewLogo/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100vh;background:#080808;font-family:'Poppins',sans-serif;color:#fff;overflow-x:hidden;}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(180deg,rgba(26,24,40,0.18),rgba(4,6,14,0.6) 60%,rgba(0,0,0,0.92) 100%),url('images/playboy-bg.png') center center/cover no-repeat;}
    @keyframes goldShimmer{0%{background-position:-400% center;}100%{background-position:400% center;}}
    .gold-shimmer{background:linear-gradient(90deg,#7a5700 0%,#c8960c 12%,#f3c675 25%,#fffbe8 38%,#ffd700 50%,#fffbe8 62%,#f3c675 75%,#c8960c 88%,#7a5700 100%);background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 5s linear infinite;}
    .page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
    .header{text-align:center;margin-bottom:28px;}
    .header .eyebrow{font-size:0.72rem;letter-spacing:0.42em;text-transform:uppercase;color:rgba(255,220,150,0.5);margin-bottom:6px;}
    .header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,8vw,3rem);font-weight:900;line-height:1;}
    .card{width:100%;max-width:440px;background:rgba(10,25,35,0.78);border:1px solid rgba(243,198,117,0.2);border-radius:16px;padding:32px 28px;backdrop-filter:blur(14px);box-shadow:0 24px 60px rgba(0,0,0,0.5);}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(243,198,117,0.75);margin-bottom:7px;font-weight:600;}
    input[type="password"]{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(243,198,117,0.22);border-radius:8px;color:#fff;font-family:'Poppins',sans-serif;font-size:0.95rem;outline:none;transition:border-color .25s;}
    input:focus{border-color:rgba(243,198,117,0.6);}
    input::placeholder{color:rgba(255,255,255,0.22);}
    .btn{width:100%;margin-top:8px;padding:14px 0;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#0d1f28;background:linear-gradient(135deg,#f3c675,#ec8b57);border:none;border-radius:10px;cursor:pointer;transition:transform .25s,box-shadow .25s;box-shadow:0 8px 28px rgba(236,139,87,0.35);}
    .btn:hover{transform:translateY(-2px);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .alert{padding:12px 16px;border-radius:8px;font-size:0.84rem;margin-bottom:16px;display:none;}
    .alert-err{background:rgba(180,30,30,0.2);border:1px solid rgba(220,60,60,0.4);color:#ffa0a0;}
    .alert-ok{background:rgba(30,120,60,0.2);border:1px solid rgba(60,180,100,0.4);color:#90ffb8;}
    #done{display:none;text-align:center;}
    #done .icon{font-size:3rem;margin-bottom:14px;}
    #done h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:12px;}
    #done p{font-size:0.9rem;color:#c8b896;line-height:1.6;}
    #done a{color:#f3c675;text-decoration:none;}
  </style>
</head>
<body>
<div id="bg"></div>
<div class="page">
  <div class="header">
    <div class="eyebrow">One Leg Up</div>
    <h1 class="gold-shimmer">Set Your Password</h1>
  </div>

  <div class="card">
    <div class="alert" id="alert"></div>

    <form id="pw-form" novalidate>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password">
      </div>
      <button type="submit" class="btn" id="submit-btn">Activate My Account</button>
    </form>

    <div id="done">
      <div class="icon">🎉</div>
      <h2 class="gold-shimmer">Password saved!</h2>
      <p>Taking you to membership now…<br><br>
      <a href="subscribe.html">Continue to membership →</a></p>
    </div>
  </div>
</div>

<script>
  const API = 'https://essentially-proposals-required-influenced.trycloudflare.com';
  const token = new URLSearchParams(window.location.search).get('token');
  const alertEl = document.getElementById('alert');

  function showAlert(msg, type = 'err') {
    alertEl.textContent = msg;
    alertEl.className = 'alert alert-' + type;
    alertEl.style.display = 'block';
  }

  if (!token) showAlert('Invalid link — token missing.');

  document.getElementById('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw  = document.getElementById('password').value;
    const cpw = document.getElementById('confirm').value;
    if (pw.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
    if (pw !== cpw)    { showAlert('Passwords do not match.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const res  = await fetch(`${API}/member/setup-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw })
    });
    const data = await res.json();
    if (!res.ok) {
      showAlert(data.error || 'Something went wrong');
      btn.disabled = false; btn.textContent = 'Activate My Account';
      return;
    }
    if (data.token) localStorage.setItem('olu_token', data.token);
    document.getElementById('pw-form').style.display = 'none';
    document.getElementById('done').style.display    = 'block';
    setTimeout(() => { window.location.href = 'subscribe.html'; }, 2200);
  });
</script>
</body>
</html>
